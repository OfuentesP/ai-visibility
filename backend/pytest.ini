[pytest]
# Run all tests in parallel across 4 workers — detects race conditions
# Usage: pytest -n auto  (auto-detects CPU count)
#        pytest -n 4     (fixed 4 workers)
addopts = -n auto --tb=short -q
asyncio_mode = auto
testpaths = .
python_files = test_*.py *_test.py
python_functions = test_*
